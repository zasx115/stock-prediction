# ============================================
# 파일명: .github/workflows/hybrid_new_daily.yml
# 설명: Hybrid_New 전략 매일 실행 (월,수,목,금)
#
# 최적 파라미터: Depth-3, Sampling50, 5D-3%, 50/50
# 기능: 손절 체크, 일일 가치 기록, 성과 업데이트
# ============================================

name: Hybrid_New Daily Check

on:
  schedule:
    - cron: '0 7 * * 1,3,4,5'
  workflow_dispatch:

jobs:
  hybrid-new-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests xgboost lightgbm scikit-learn gspread oauth2client python-dotenv lxml

      - name: Setup environment
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> $GITHUB_ENV

      - name: Run Hybrid_New Daily
        working-directory: ./src
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python -c "
          from hybrid_trading import run_hybrid_new_daily

          print('🆕 Hybrid_New Daily 실행 시작...')
          run_hybrid_new_daily()
          print('✅ 완료!')
          "
