# ============================================
# 파일명: .github/workflows/hybrid_new_weekly.yml
# 설명: Hybrid_New 전략 주간 자동 실행
#
# 최적 파라미터: Depth-3, Sampling50, 5D-3%, 50/50
# 스케줄: 매주 화요일 07:00 UTC (한국시간 16:00)
# 모멘텀(06:45) → 기존 Hybrid(06:55) → Hybrid_New(07:00)
# ============================================

name: Hybrid_New Weekly Signal

on:
  schedule:
    - cron: '0 7 * * 1,3,4,5'
  workflow_dispatch:

jobs:
  hybrid-new-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests xgboost lightgbm scikit-learn gspread oauth2client python-dotenv lxml

      - name: Setup environment
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> $GITHUB_ENV
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json
          echo "GOOGLE_CREDENTIALS_PATH=/tmp/credentials.json" >> $GITHUB_ENV

      - name: Run Hybrid_New Strategy
        working-directory: ./src
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python -c "
          from hybrid_trading import run_hybrid_new_weekly

          print('🆕 Hybrid_New 전략 실행 시작...')
          result = run_hybrid_new_weekly()
          print('✅ 완료!')
          "
