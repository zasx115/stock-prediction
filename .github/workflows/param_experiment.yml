# ============================================
# 파일명: .github/workflows/param_experiment.yml
# 설명: 핵심 파라미터 비교 실험 워크플로우
#
# 3가지 실험:
#   1. label          : 라벨 정의 비교 (5D-3%, 5D-5%, 10D-5%, 10D-7%, 20D-5%)
#   2. walkforward    : WF 재훈련 주기 비교 (1M, 3M, 6M)
#   3. hybrid_weight  : 하이브리드 가중치 비교 (Pure-AI ~ Mom-Heavy)
#   4. all            : 위 3가지 모두 실행
#
# 백테스트: 2018-07-01~현재, 학습: 2013-07-01~2018-07-01
# 실행: Actions → Parameter Experiment → Run workflow
# 결과: Artifacts에서 차트(PNG) + CSV 다운로드
# ============================================

name: Parameter Experiment

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: '실험 유형'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - label
          - walkforward
          - hybrid_weight
      train_start:
        description: 'AI 학습 시작일 (YYYY-MM-DD)'
        required: false
        default: '2013-07-01'
      train_end:
        description: '초기 학습 종료일 = 백테스트 시작일 (YYYY-MM-DD)'
        required: false
        default: '2018-07-01'
      backtest_end:
        description: '백테스트 종료일 (빈값=오늘)'
        required: false
        default: ''
      wf_step_months:
        description: 'Walk-Forward 스텝 (개월, label/hybrid 실험용)'
        required: false
        default: '3'
      initial_capital:
        description: '초기 자본금 (USD)'
        required: false
        default: '10000'
      momentum_weight:
        description: '모멘텀 가중치 (label/walkforward 실험용)'
        required: false
        default: '0.35'
      ai_weight:
        description: 'AI 가중치 (label/walkforward 실험용)'
        required: false
        default: '0.65'
      commission:
        description: '수수료율'
        required: false
        default: '0.001'
      slippage:
        description: '슬리피지율'
        required: false
        default: '0.001'

jobs:
  param-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-param-exp-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests xgboost lightgbm scikit-learn matplotlib python-dotenv lxml

      - name: Run Parameter Experiment
        working-directory: ./src
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python run_param_experiment.py \
            --experiment "${{ github.event.inputs.experiment }}" \
            --train_start "${{ github.event.inputs.train_start }}" \
            --train_end "${{ github.event.inputs.train_end }}" \
            --backtest_end "${{ github.event.inputs.backtest_end }}" \
            --wf_step_months "${{ github.event.inputs.wf_step_months }}" \
            --initial_capital "${{ github.event.inputs.initial_capital }}" \
            --momentum_weight "${{ github.event.inputs.momentum_weight }}" \
            --ai_weight "${{ github.event.inputs.ai_weight }}" \
            --commission "${{ github.event.inputs.commission }}" \
            --slippage "${{ github.event.inputs.slippage }}" \
            --output_dir ".."

      - name: Upload label experiment results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: param-exp-label
          path: |
            param_exp_label_chart.png
            param_exp_label_results.csv
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload walkforward experiment results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: param-exp-walkforward
          path: |
            param_exp_walkforward_chart.png
            param_exp_walkforward_results.csv
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload hybrid weight experiment results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: param-exp-hybrid-weight
          path: |
            param_exp_hybrid_weight_chart.png
            param_exp_hybrid_weight_results.csv
          retention-days: 30
          if-no-files-found: ignore
